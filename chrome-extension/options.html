<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>NBJ Condenser - Options</title>
  <link rel="stylesheet" href="options.css">
</head>

<body>
  <div class="card">
    <h1>NBJ Condenser - Options</h1>

    <div class="field">
      <label for="serverUrl">Server URL</label>
      <div class="url-input-group">
        <select id="serverUrlSelect">
          <option value="">Select a server or enter custom URL below...</option>
          <!-- preset options injected by options.js from build-time PRESET_URLS/PRESET_NAMES -->
          <option value="custom">Custom URL...</option>
        </select>
        <input type="url" id="serverUrl" placeholder="Enter custom URL" spellcheck="false" />
      </div>
      <div class="hint">Select from the list or enter a custom URL</div>
    </div>


    <div class="field section-divider">
      <button id="downloadClientBtn">
        ⬇️ Download Latest Extension
      </button>
      <div class="hint compact">
        Downloads the latest Chrome extension ZIP from the currently selected server.
      </div>
    </div>

    <div class="field section-divider">
      <button class="danger" id="resetStateBtn">
        🗑️ Reset All State
      </button>
      <div class="hint compact">
        Clears all jobs, settings, cached data, and client ID. This cannot be undone.
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="build-info.js"></script>
  <script src="options.js"></script>
</body>

</html>
