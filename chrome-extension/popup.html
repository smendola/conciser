<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      margin: 0;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #1a73e8;
    }

    .video-info {
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 12px;
      word-break: break-all;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 12px;
    }

    .tab {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      background: #f5f5f5;
      color: #333;
    }

    .tab.active {
      color: #1a73e8;
      border-bottom-color: #1a73e8;
      background: transparent;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover {
      background: #1765cc;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      background: #e8f0fe;
      border-radius: 4px;
      font-size: 13px;
    }

    .status.processing {
      background: #fff3cd;
    }

    .status.completed {
      background: #d4edda;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .progress {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
      font-family: monospace;
    }

    .download-btn {
      background: #28a745;
      margin-top: 8px;
    }

    .download-btn:hover {
      background: #218838;
    }

    .error {
      color: #d32f2f;
      margin-top: 8px;
      font-size: 12px;
    }

    .settings {
      margin: 12px 0;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 12px;
    }

    .setting-group {
      margin-bottom: 12px;
    }

    .setting-group:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      color: #333;
    }

    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      background: white;
    }

    input[type="range"] {
      width: 100%;
      margin: 6px 0;
    }

    .slider-value {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .strategy-desc {
      font-size: 10px;
      color: #666;
      font-style: italic;
      margin-top: 4px;
    }

    .radio-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .radio-option {
      flex: 1;
      min-width: 60px;
    }

    .radio-option input[type="radio"] {
      display: none;
    }

    .radio-option label {
      display: block;
      padding: 6px 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .radio-option label:hover {
      border-color: #1a73e8;
      background: #f0f7ff;
    }

    .radio-option input[type="radio"]:checked + label {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }

  </style>
</head>
<body>
  <h2>🎬 NBJ Condenser</h2>

  <div class="video-info" id="videoInfo">
    Waiting for YouTube page...
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="condense">Condense</button>
    <button class="tab" data-tab="takeaways">Takeaways</button>
  </div>

  <!-- Condense Tab -->
  <div class="tab-content active" id="condense-tab">
    <div class="settings" id="settings">
    <div class="setting-group">
      <label class="setting-label" for="videoModeSelect">Output Mode</label>
      <select id="videoModeSelect">
        <option value="slideshow">Slideshow</option>
        <option value="audio_only">Audio Only (MP3)</option>
      </select>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="voiceSelect">Voice</label>
      <select id="voiceSelect">
        <option value="">Loading voices...</option>
      </select>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="aggressivenessSlider">Aggressiveness</label>
      <input type="range" id="aggressivenessSlider" min="1" max="10" value="5" step="1">
      <div class="slider-value">
        <span id="aggressivenessValue">5</span>
      </div>
      <div id="strategyDesc" class="strategy-desc">Loading...</div>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="speedSlider">Speech Speed</label>
      <input type="range" id="speedSlider" min="0.9" max="2.0" value="1.10" step="0.01">
      <div class="slider-value">
        <span id="speedValue">1.10x</span>
        <span></span>
      </div>
    </div>

    <div class="setting-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="prependIntroCheck">
        <span class="setting-label" style="margin:0;">Prepend key take-aways intro</span>
      </label>
    </div>
  </div>

    <button id="condenseBtn" disabled>Condense Video</button>

    <div id="statusContainer"></div>
  </div>

  <!-- Takeaways Tab -->
  <div class="tab-content" id="takeaways-tab">
    <div class="settings">
      <div class="setting-group">
        <label class="setting-label">Number of Takeaways</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" id="top3" name="top" value="3">
            <label for="top3">Top 3</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="top5" name="top" value="5">
            <label for="top5">Top 5</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="top10" name="top" value="10">
            <label for="top10">Top 10</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="topAuto" name="top" value="auto" checked>
            <label for="topAuto">Auto</label>
          </div>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Output Format</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" id="formatText" name="format" value="text" checked>
            <label for="formatText">Text</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="formatAudio" name="format" value="audio">
            <label for="formatAudio">Audio</label>
          </div>
        </div>
      </div>

      <div class="setting-group" id="takeawaysVoiceGroup" style="display:none;">
        <label class="setting-label" for="takeawaysVoiceSelect">Voice</label>
        <select id="takeawaysVoiceSelect">
          <option value="">Loading voices...</option>
        </select>
      </div>
    </div>

    <button id="takeawaysBtn" disabled>Extract Takeaways</button>

    <div id="takeawaysStatusContainer"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
